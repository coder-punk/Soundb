<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08090e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Soundboard" />
  <title>Soundboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <div class="topbar-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4"  y1="12" x2="4"  y2="12"/>
            <line x1="8"  y1="8"  x2="8"  y2="16"/>
            <line x1="12" y1="4"  x2="12" y2="20"/>
            <line x1="16" y1="7"  x2="16" y2="17"/>
            <line x1="20" y1="10" x2="20" y2="14"/>
          </svg>
        </div>
        <div>
          <h1>Soundboard</h1>
          <p>Neem je eigen sounds op en speel ze direct af.</p>
        </div>
      </div>
      <button id="installBtn" class="secondary hidden" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Installeer
      </button>
    </header>

    <main>
      <section class="panel recorder-panel">
        <div class="status-row">
          <span id="micStatus" class="badge ghost">Microfoon niet actief</span>
          <span id="countStatus" class="badge ghost">0 sounds</span>
        </div>

        <div class="controls">
          <input id="soundName" type="text" maxlength="40" placeholder="Naam van je sound" />
          <button id="recordBtn" class="record" type="button">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="12" r="7"/>
            </svg>
            Opnemen
          </button>
          <button id="stopBtn" class="secondary" type="button" disabled>
            <svg viewBox="0 0 24 24" fill="currentColor">
              <rect x="5" y="5" width="14" height="14" rx="2"/>
            </svg>
            Stop
          </button>
        </div>

        <p class="hint">
          Op iPhone werkt opnemen alleen nadat je microfoontoegang hebt gegeven. Alles wordt lokaal op je apparaat opgeslagen.
        </p>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Jouw sounds</h2>
          <button id="clearAllBtn" class="secondary" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
            Alles wissen
          </button>
        </div>
        <div id="emptyState" class="empty-state">
          Nog geen sounds opgenomen. Druk op <strong>Opnemen</strong> om te beginnen.
        </div>
        <div id="soundGrid" class="sound-grid"></div>
      </section>
    </main>
  </div>

  <template id="soundCardTemplate">
    <article class="sound-card">
      <div class="card-top">
        <span class="card-play-icon" aria-hidden="true">
          <!-- play icon -->
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="6 3 20 12 6 21 6 3"/>
          </svg>
          <!-- pause icon -->
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        </span>
        <div class="card-actions">
          <button class="icon-btn loop-btn" title="Loop" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
          </button>
          <button class="icon-btn download-btn" title="Bewaar" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
          <button class="icon-btn delete-btn" title="Verwijder" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="card-body">
        <input class="sound-title" type="text" maxlength="40" />
      </div>

      <div class="card-footer">
        <span class="time-elapsed">00:00</span>
        <span class="time-remaining">-00:00</span>
      </div>

      <div class="card-progress">
        <div class="card-progress-bar"></div>
      </div>

      <audio preload="metadata"></audio>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
