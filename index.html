<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Soundboard" />
  <title>Soundboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Soundboard</h1>
        <p>Neem je eigen sounds op en speel ze direct af.</p>
      </div>
      <button id="installBtn" class="secondary hidden" type="button">Installeer</button>
    </header>

    <main>
      <section class="panel recorder-panel">
        <div class="status-row">
          <span id="micStatus" class="badge">Microfoon niet actief</span>
          <span id="countStatus" class="badge ghost">0 sounds</span>
        </div>

        <div class="controls">
          <input id="soundName" type="text" maxlength="40" placeholder="Naam van je sound" />
          <button id="recordBtn" class="record" type="button">● Opnemen</button>
          <button id="stopBtn" class="danger" type="button" disabled>■ Stop</button>
        </div>

        <p class="hint">
          Tip: op iPhone werkt opnemen alleen nadat je microfoon-toegang geeft. Alles wordt lokaal op je apparaat bewaard.
        </p>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Jouw sounds</h2>
          <button id="clearAllBtn" class="secondary" type="button">Alles wissen</button>
        </div>
        <div id="emptyState" class="empty-state">
          Nog geen sounds. Neem iets op. De mensheid doet het je toch niet cadeau.
        </div>
        <div id="soundGrid" class="sound-grid"></div>
      </section>
    </main>
  </div>

  <template id="soundCardTemplate">
    <article class="sound-card">
      <div class="sound-card-top">
        <input class="sound-title" type="text" maxlength="40" />
        <span class="sound-meta"></span>
      </div>
      <div class="sound-actions">
        <button class="play-btn primary" type="button">▶ Afspelen</button>
        <button class="stop-play-btn secondary" type="button">⏹ Stop</button>
        <button class="download-btn secondary" type="button">⬇ Bewaar</button>
        <button class="delete-btn danger" type="button">🗑 Verwijder</button>
      </div>
      <audio preload="metadata"></audio>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
